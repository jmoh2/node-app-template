<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Input and Tracker</title>
    <link rel="stylesheet" href="css/userprofile.css">
</head>
<body>
    <!-- for going back to basepage -->
    <button class="button" onclick="goHome()">Back</button>
    <script>
    function goHome() {window.location.href = '/basepage';}
    </script>

    <br><br><br>

    <label for="workoutName">Workout Type:</label>
    <input type="text" id="workoutName" name="workoutName">

    <label for="workoutType">Workout Type:</label>
    <select id="workoutType" name="workoutType">
        <option value="cardio">Cardio</option>
        <option value="strength">Strength Training</option>
        <option value="flexibility">Flexibility</option>
        <option value="balance">Balance Training</option>
    </select>

    <label for="workoutIntensity">Intensity:</label>
    <select id="workoutIntensity" name="workoutIntensity">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <label for="duration">Duration (minutes):</label>
    <input type="number" id="duration" name="duration" min="1">

    <br>
    
    <button type="submit">Submit</button>

    <br><br>

    <select id="workoutTableFilter" name="workoutTableFilter">
        <option value="None">None</option>
        <option value="Date">Date</option>
        <option value="Name">Name</option>
        <option value="Type">Type</option>
        <option value="Duration">Duration</option>
        <option value="Intensity">Intensity</option>
    </select>
    
    <table id="workoutTable" class="center">
        <thead>
            <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Type</th>
                <th>Intensity</th>
                <th>Duration (mins)</th>
                <th>Calories Burned</th>
                <th>Notes</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

   

<br>


    suggestions here or in top corner

    <script src="js/workouts.js"></script>


</body>
</html>
