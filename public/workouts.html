<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Input and Tracker</title>
    <link rel="stylesheet" href="css/workout.css">
</head>
<body>
     <!-- Suggested Workout Card -->
    <div id="suggestionCard" class="suggestionCard">
        <strong>Suggested Workout</strong>
        <div id="suggestionContent" style="margin-top: 8px; color: #333;">Loading...</div>
        <button id="logSuggestionButton" style="margin-top: 10px; width: 100%;" class="button">Log This Workout</button>
        <p id="suggestionResult" style="font-size: 12px; margin-top: 6px; color: green;"></p>
    </div>

    <!-- for going back to basepage -->
    <button class="button" onclick="goHome()">Back</button>
    <script>
    function goHome() {window.location.href = '/basepage';}
    </script>

    <br><br><br>

    <label for="workoutName">Workout Type:</label>
    <input type="text" id="workoutName" name="workoutName">

    <!-- Dropdown menu with broad workout options: Cardio, Strength Training, HIIT, Flexibility/Yoga, Sports, Core, Recovery, and Other -->
    <label for="workoutType">Workout Type:</label>
    <select id="workoutType" name="workoutType">
        <option value="cardio">Cardio</option>
        <option value="strength">Strength Training</option>
        <option value="hiit">HIIT</option>
        <option value="flexibility">Flexibility/Yoga</option>
        <option value="sports">Sports</option>
        <option value="core">Core</option>
        <option value="recovery">Recovery</option>
        <option value="balance">Balance Training</option>
        <option value="other">Other</option>
    </select>

    <label for="workoutIntensity">Intensity:</label>
    <select id="workoutIntensity" name="workoutIntensity">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <label for="caloriesBurned">Calories Burned:</label>
    <input type="number" id="caloriesBurned" name="caloriesBurned" min="0"> 

    <br>

    <label for="duration">Duration (minutes):</label>
    <input type="number" id="duration" name="duration" min="1">


    <label for="notes">Notes:</label>
    <input type="text" id="notes" name="notes">

    <label for="date">Date:</label>
    <input type="date" id="date" name="date"> 
    <br>
    
    <button id="submit" class="button">Submit</button>

    <br><br>

    <!-- Workout Table -->

    <h4>Filter for Table</h4>

    <label for="dateFrom">From:</label>
    <input type="date" id="dateFrom">
    <label for="dateTo">To:</label>
    <input type="date" id="dateTo">

    <br>
    
    <label for="nameFilter">Workout Name:</label>
    <input type="text" id="nameFilter">

    <br>

    <label for="typeFilter">Workout Type:</label>
    <select id="typeFilter">
        <option value="">All</option>
        <option value="cardio">Cardio</option>
        <option value="strength">Strength Training</option>
        <option value="hiit">HIIT</option>
        <option value="flexibility">Flexibility/Yoga</option>
        <option value="sports">Sports</option>
        <option value="core">Core</option>
        <option value="recovery">Recovery</option>
        <option value="balance">Balance Training</option>
        <option value="other">Other</option>
    
    </select>

    <br>

    <label for="intensityFilter">Intensity:</label>
    <select id="intensityFilter">
        <option value="">All</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <br>
    
    <label for="durationMin">Min Duration:</label>
    <input type="number" id="durationMin">
    <label for="durationMax">Max Duration:</label>
    <input type="number" id="durationMax">

    <br>

    <label for="caloriesMin">Min Calories:</label>
    <input type="number" id="caloriesMin">
    <label for="caloriesMax">Max Calories:</label>
    <input type="number" id="caloriesMax">

    <br><br><br>

    <button id="applyFiltersButton" type="button" class="tablebutton">Apply Filters</button>

    <button id="clearFiltersButton" type="button" class="tablebutton">Clear Filters</button>

    <button id="refreshButton" class="tablebutton">Refresh Table</button>
    
    <h3>Past Workouts</h3>

    <table id="workoutTable" class="center">
        <thead>
            <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Type</th>
                <th>Intensity</th>
                <th>Duration (mins)</th>
                <th>Calories Burned</th>
                <th>Notes</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    

   

<br>


    <script src="/js/datamodel.js"></script>
    <script src="/js/workouts.js"></script>

</body>
</html>
