<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Input and Tracker</title>
    <link rel="stylesheet" href="css/workout.css">
</head>
<body>

    <!-- for going back to basepage -->
    <button class="button" onclick="goHome()">Back</button>
    <script>
    function goHome() {
        window.location.href = '/basepage';
    }
    </script>

    <h1>Calorie and Macro Tracker</h1>

    <h4>Input Meal Data</h4>

    <label for="mealDate">Date:</label>
    <input type="date" id="mealDate" required>

    <label for="mealType">Meal Type:</label>
    <select id="mealType" required>
        <option value="">Select</option>
        <option value="breakfast">Breakfast</option>
        <option value="lunch">Lunch</option>
        <option value="dinner">Dinner</option>
        <option value="snack">Snack</option>
    </select>

    <br>

    <label for="mealDescription">Meal Description:</label>
    <input type="text" id="mealDescription" required>

    <br>

    <label for="calories">Calories:</label>
    <input type="number" id="calories" required>

    <label for="protein">Protein (g):</label>
    <input type="number" id="protein" required>

    <label for="fats">Fats (g):</label>
    <input type="number" id="fats" required>

    <label for="carbs">Carbs (g):</label>
    <input type="number" id="carbs" required>

    <br><br>

    <button id="addMealButton" type="button" class="tablebutton">Add Meal</button>

    
<h4>Filter for Table</h4>

    <label for="dateFrom">From:</label>
    <input type="date" id="dateFrom">
    <label for="dateTo">To:</label>
    <input type="date" id="dateTo">

    <br>

    <label for="descriptionFilter">Meal Description:</label>
    <input type="text" id="descriptionFilter">

    <br>

    <label for="typeFilter">Meal Type:</label>
    <select id="typeFilter">
        <option value="">All</option>
        <option value="breakfast">Breakfast</option>
        <option value="lunch">Lunch</option>
        <option value="dinner">Dinner</option>
        <option value="snack">Snack</option>
    </select>


    <br>

    <label for="caloriesMin">Min Calories:</label>
    <input type="number" id="caloriesMin">
    <label for="caloriesMax">Max Calories:</label>
    <input type="number" id="caloriesMax">

    <br>

    <label for="proteinMin">Min Protein:</label>
    <input type="number" id="proteinMin">
    <label for="proteinMax">Max Protein:</label>
    <input type="number" id="proteinMax">

    <br>

    <label for="fatsMin">Min Fats:</label>
    <input type="number" id="fatsMin">
    <label for="fatsMax">Max Fats:</label>
    <input type="number" id="fatsMax">

    <br>

    <label for="carbsMin">Min Carbs:</label>
    <input type="number" id="carbsMin">
    <label for="carbsMax">Max Carbs:</label>
    <input type="number" id="carbsMax">


    <br><br><br>

    <button id="applyFiltersButton" type="button" class="tablebutton">Apply Filters</button>

    <button id="clearFiltersButton" type="button" class="tablebutton">Clear Filters</button>

    <button id="refreshButton" class="tablebutton">Refresh Table</button>

<!-- Actual Table for Past Meals -->

    <h3>Past Meals</h3>

    <table id="mealTable" class="center">
        <thead>
            <tr>
                <th>Date</th>
                <th>Meal Type</th>
                <th>Meal Description</th>
                <th>Calories</th>
                <th>Protein</th>
                <th>Fats</th>
                <th>Carbs</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="js/caloriemacro.js"></script>
    <script src ="js/datamodel.js"></script>

</body>
</html>
