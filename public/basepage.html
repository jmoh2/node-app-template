<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="css/basepage.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div>
        <button id="logoutButton" class="logout-btn">Logout</button>
    </div>

    <img src="./logos/GymRat.png" class="logo" alt="Aesthetic GymRat logo">

    <div class="welcome-message">
        <h1 id="welcomeHeading"></h1>
        <p>Your personal fitness companion.</p>
    </div>


    <div class="container">
        <div class="header">
            <h2>Dashboard</h2>
        <a href="userprofile.html" class="button">User Profile</a>
        <a href="workouts.html" class="button">Workout Input/Tracker</a>
        <a href="caloriemacro.html" class="button">Calorie and Macro Input/Tracker</a>
        </div>
    </div>

    <div class="dashboard">
        <div class="dashboard-item">
            <h3>Total Workouts</h3>
            <p id="workoutCount">Loading...</p>
        </div>
        <div class="dashboard-item">
            <h3>Calories Burned</h3>
            <p id="calorieSummary">Loading...</p>
        </div>
        <div class="dashboard-item">
            <h3>Meals</h3>
            <p id="mealSummary">Loading...</p>
        </div>
        <div class="dashboard-item">
            <h3>Active Days</h3>
            <p id="activeDaysSummary">Loading...</p>
        </div>
    </div>

    <div class="dashboard">
        <div class="progress-graph">
            <h1>Progress Towards Goals</h1>
        </div>
    </div>


    <script src="/js/basepage.js"></script>
    <script src="/js/datamodel.js"></script>
</body>
</html>
