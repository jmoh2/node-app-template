<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logon</title>
    <link rel="stylesheet" href="css/logon.css">
</head>

<body>
    <div class="container">
        <h1>Welcome to Gymrat App</h1>
        <div class="tab">
            <button class="tab-button active" id="login-tab">Logon</button>
            <button class="tab-button" id="create-account-tab">Create Account</button>
        </div>

        <p id="message" class="message"></p>

        <div id="form-container">
            <!-- Logon Form -->
            <form id="logon-form" class="active-form">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>

                <label for="login-password">Password:</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>

                <button type="submit" class="button">Logon</button>
            </form>

            <!-- Create Account Form -->
            <form id="create-account-form">
                <label for="create-email">Email:</label>
                <input type="email" id="create-email" placeholder="Enter your email" required>

                <label for="create-password">Password:</label>
                <input type="password" id="create-password" placeholder="Create your password" required>

                <!-- Gender Radio Options -->
                <label>Gender:</label>

                <div class="gender-options">
                    <label><input type="radio" name="gender" value="male" required> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                    <label><input type="radio" name="gender" value="other"> Other</label>
                </div>

                <!-- Height, Weight, Age Selection -->
                <label for="height">Height (inches):</label>
                <input type="number" id="height" name="height" min="36" max="96" placeholder="Enter your height"
                    required>

                <label for="weight">Weight (lbs):</label>
                <input type="number" id="weight" name="weight" min="50" max="600" placeholder="Enter your weight"
                    required>

                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="13" max="120" placeholder="Enter your age" required>

                <!--Fitness Goal Selection-->
                <label for="fitness-goal">Fitness Goal:</label>
                <select id="fitness-goal" name="fitness_goal" required>
                    <option value="" disabled selected hidden>Select your fitness goal</option>
                    <option value="lose_weight">Lose Weight</option>
                    <option value="maintain_weight">Maintain Weight</option>
                    <option value="gain_weight">Gain Weight</option>
                    <option value="build_muscle">Build Muscle</option>
                </select>

                <!--Exercise level selection-->
                <label for="exercise-level">Exercise Level:</label>
                <select id="exercise-level" name="exercise_level" required>
                    <option value="" disabled selected>Select your exercise level</option>
                    <option value="low">Low (little or no exercise)</option>
                    <option value="moderate">Moderate (exercise 3–4 days/week)</option>
                    <option value="high">High (exercise 5+ days/week)</option>
                </select>

                <!--Create Account Button-->
                <button type="submit" class="button">Create account</button>
                <p id="message" class="message"></p>
        </div>
    </div>

    <img src="./logos/GymRat.png" style="float: right;" alt="Aesthetic GymRat logo">

    <script src="js/logon.js"></script>
</body>

</html>
