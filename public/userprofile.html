<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <link rel="stylesheet" href="css/userprofile.css">
</head>

<body>
    <div class="header-bar">
        <button class="button" onclick="goHome()">Back</button>
        <div></div>
    </div>
    <script>
    function goHome() {
        window.location.href = '/basepage';
    }
    </script>

    <div class="user-message">
    <h1 id="userHeading"></h1>
</div>

<div class="container" >
<h2>Change Stats: </h2>

    <label>Gender</label>
    <select id="gender">
        <option value="" disabled selected>-- Loading --</option>
        <option value="female">Female</option>
        <option value="male">Male</option>
        <option value="other">Other</option>
    </select>

<br>

    <label>Age</label>
    <input id="age" type="number">

<br>

    <label>Height (inches)</label>
    <input id="height" type="number">

<br>

    <label>Weight (lbs)</label>
    <input id="weight" type="number">

<br>

    <label>Fitness Goal</label>
    <select id="fitness_goal">
        <option value="" disabled selected>-- Loading --</option>  <!-- This is my favorite feature it disapears -->
        <option value="lose weight">Lose Weight</option>
        <option value="build muscle">Build Muscle</option>
        <option value="gain weight">Gain Weight</option>
        <option value="maintain weight">Maintain Weight</option>
    </select>

    <br><br>

    <label>Exercise Level</label>
    <select id="exercise_level">
        <option value="" disabled selected>-- Loading --</option>
        <option value="low">Low</option>
        <option value="moderate">Moderate</option>
        <option value="high">High</option>
    </select>

    <button class="button" onclick="save()">Save</button>
    <p id="result"></p>

</div>

<script src="/js/userprofile.js"></script>
<script src="/js/datamodel.js"></script>
</body>
</html>
